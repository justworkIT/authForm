name: Supabase Keep-Alive

# Runs twice a week to prevent Supabase's free-tier project from pausing
# after 7 days of database inactivity. Two runs/week gives margin in case
# one run fails or is delayed by GitHub's scheduler.
on:
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC
    - cron: "0 9 * * 4" # Thursday 09:00 UTC
  workflow_dispatch: {} # allows manually triggering a run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase client
        run: npm install @supabase/supabase-js

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/keepalive.mjs
